<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ESI Mito o Realidad!</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div>
		<div class='top-top'></div>
		<div class='top-left'></div>
	</div>
	<div class="inputs">
        <p>Edad</p>
		<input class="age" type='text' id="age" placeholder="-"></button>
        <p>Género</p>
        <input class="gen" type='text' id="gen" placeholder="-"></button>
	</div>
    <button id="continue_button" type="button" onclick="_continue()" disabled>Continuar</button>
	<div>
		<div class='bottom-bottom'>
			<p></p>
		</div>
		<div class='bottom-right'>
			<p></p>
		</div>
	</div>
    <script>
        var age = document.getElementById('age');
        var gen = document.getElementById('gen');
        var continue_button = document.getElementById('continue_button');
        
        age.addEventListener('input', checkInputs);
        gen.addEventListener('input', checkInputs);


        function checkInputs(){
            if(!isNaN(age.value) && isNaN(gen.value) && age.value.trim() !== '' && gen.value.trim() !== '') {
                continue_button.disabled = false;
            } else {
                continue_button.disabled = true;
                if (isNaN(age.value) && age.value.trim() !== ''){
                    age.classList.add('incorrect');
                } else {
                    age.classList.remove('incorrect');
                };
                if (!isNaN(gen.value) && gen.value.trim() !== ''){
                    gen.classList.add('incorrect');
                } else {
                    gen.classList.remove('incorrect');
                };
            };
        };
        function _continue(){
            localStorage.setItem(age.id, age.value);
            localStorage.setItem(gen.id, gen.value);
            window.location.replace('test.html');
        }
    </script>
</body>
</html>
